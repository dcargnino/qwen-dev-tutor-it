name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install project
        run: uv sync --dev --only-dev

      - name: Run ruff check
        run: uv run ruff check src/qwen_dev_tutor/ tests/
